run_name: lapa_hrnet_w18_heatmap_e80
seed: 3407

system:
  output_root: runs

data:
  dataset: lapa
  root: ../data
  lapa_root: ../data/LaPa
  image_size: 256
  num_landmarks: 106
  enable_hflip: true
  metric_eye_groups:
    - [66, 67, 68, 69, 70, 71, 72, 73, 74, 75, 76, 77, 78, 79]
    - [80, 81, 82, 83, 84, 85, 86, 87, 88, 89, 90, 91, 92, 93]
  valid_ratio: 0.1
  test_ratio: 0.1
  download: false
  num_workers: 0
  train_subset: null
  valid_subset: null
  test_subset: null
  crop_scale: 1.30
  aug_scale_range: [0.90, 1.20]
  aug_shift: 0.05

model:
  arch: hrnet_w18
  base_channels: 32
  num_blocks: 2

train:
  epochs: 80
  batch_size: 16
  lr: 0.0015
  weight_decay: 0.01
  amp: true
  grad_clip: 1.0
  ema_decay: 0.99
  label_smoothing: 0.0
  log_interval_steps: 0
  init_mean_shape: false
  scheduler: cosine
  use_ema: true
  select_metric: valid_nme
  select_mode: min

loss:
  wing_w: 0.04
  wing_epsilon: 0.01
  geometry_weight: 0.08
  pose_weight: 0.0
  heatmap_weight: 1.0
  heatmap_loss: kl
  heatmap_sigma: 1.5

eval:
  primary_threshold: 0.08
  viz_samples: 12