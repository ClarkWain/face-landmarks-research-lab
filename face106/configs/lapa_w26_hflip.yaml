run_name: lapa_w26_hflip_e60
seed: 3407

system:
  output_root: runs

data:
  dataset: lapa
  root: ../data
  lapa_root: ../data/LaPa
  image_size: 224
  num_landmarks: 106
  enable_hflip: true
  metric_eye_groups:
    - [66, 67, 68, 69, 70, 71, 72, 73, 74, 75, 76, 77, 78, 79]
    - [80, 81, 82, 83, 84, 85, 86, 87, 88, 89, 90, 91, 92, 93]
  valid_ratio: 0.1
  test_ratio: 0.1
  download: false
  num_workers: 0
  train_subset: null
  valid_subset: null
  test_subset: null
  crop_scale: 1.25
  aug_scale_range: [0.90, 1.20]
  aug_shift: 0.05

model:
  width_mult: 2.6
  hidden_dim: 896
  dropout: 0.10
  use_se: true
  head_type: global
  fusion_dim: 192
  pose_head: false

train:
  epochs: 60
  batch_size: 32
  lr: 0.002
  weight_decay: 0.01
  amp: true
  grad_clip: 1.0
  ema_decay: 0.99
  label_smoothing: 0.0
  log_interval_steps: 0
  init_mean_shape: true
  scheduler: onecycle
  use_ema: true
  select_metric: valid_nme
  select_mode: min

loss:
  wing_w: 0.04
  wing_epsilon: 0.01
  geometry_weight: 0.10
  pose_weight: 0.0
  heatmap_weight: 0.0
  heatmap_sigma: 1.5

eval:
  primary_threshold: 0.08
  viz_samples: 12
